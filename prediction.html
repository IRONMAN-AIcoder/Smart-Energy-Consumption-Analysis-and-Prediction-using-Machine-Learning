<!DOCTYPE html>
<html>
<head>
    <title>Energy Forecast</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .card {
            background: #ffffff;
            color: #333;
            padding: 40px;
            width: 420px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 10px;
            color: #2a5298;
        }

        p {
            font-size: 15px;
            margin-bottom: 25px;
            color: #555;
        }

        input {
            width: 90%;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

        button {
            width: 95%;
            padding: 14px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background: #2a5298;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #1e3c72;
            transform: translateY(-2px);
        }

        #result {
            margin-top: 25px;
            font-size: 20px;
            font-weight: bold;
            color: #2a5298;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #2a5298;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Energy Usage Prediction</h1>
        <p>This prediction uses the last 48 hours of data automatically.</p>

        <input
            id="house"
            type="number"
            step="0.01"
            placeholder="Last hour energy (kW)"
        >

        <button onclick="sendPrediction()">Predict Next Hour</button>

        <div id="result"></div>

        <a href="/" class="back-link">← Back to Home</a>
    </div>

    <script>
        function sendPrediction() {
            const value = parseFloat(document.getElementById("house").value);

            fetch("/predict_with_input", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ house_power: value })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("result").innerHTML =
                    "Next Hour Prediction: <b>" +
                    data.next_power_kW.toFixed(3) + " kW</b>";
            });
        }
    </script>

</body>
</html>
