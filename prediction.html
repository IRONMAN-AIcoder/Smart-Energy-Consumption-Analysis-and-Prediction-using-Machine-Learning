<!DOCTYPE html>
<html>
<head>
    <title>Energy Forecast</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .card {
            background: #ffffff;
            color: #333;
            padding: 40px;
            width: 460px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 8px;
            color: #2a5298;
        }

        p {
            font-size: 14px;
            margin-bottom: 22px;
            color: #555;
        }

        input {
            width: 90%;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        button {
            width: 95%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            background: #2a5298;
            color: #ffffff;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #1e3c72;
            transform: translateY(-2px);
        }

        .secondary {
            background: #4caf50;
        }

        .secondary:hover {
            background: #388e3c;
        }

        #result {
            margin-top: 25px;
            font-size: 17px;
            color: #2a5298;
            line-height: 1.5;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            text-decoration: none;
            color: #2a5298;
            font-size: 14px;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Energy Usage Forecast</h1>
    <p>Predictions are based on the last 48 hours using LSTM forecasting.</p>

    <input
        id="house"
        type="number"
        step="0.01"
        placeholder="Last hour energy"
    >

    <button onclick="predictNextHour()">Predict Next Hour</button>
    <button class="secondary" onclick="predictWeek()">Predict next Week</button>
    <button class="secondary" onclick="predictMonth()">Predict next Month</button>

    <div id="result"></div>

    <a href="/" class="back-link">← Back to Home</a>
</div>

<script>
    function predictNextHour() {
        const value = parseFloat(document.getElementById("house").value);

        if (isNaN(value)) {
            alert("Please enter last hour energy value");
            return;
        }

        fetch("/predict_with_input", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ house_power: value })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("result").innerHTML =
                "<b>Next Hour Prediction:</b><br>" +
                data.next_power_kW.toFixed(3) + " W";
        });
    }

    function predictWeek() {
        fetch("/predict_week")
        .then(res => res.json())
        .then(data => {
            document.getElementById("result").innerHTML =
                "<b>Next Week Forecast</b><br>" +
                "Average Usage: " + data.avg_kW.toFixed(2) + " W";
        });
    }

    function predictMonth() {
        fetch("/predict_month")
        .then(res => res.json())
        .then(data => {
            document.getElementById("result").innerHTML =
                "<b>Next Month Forecast</b><br>" +
                "Average Usage: " + data.avg_kW.toFixed(2) + " W";
        });
    }
</script>

</body>
</html>
